name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "vite.config.ts"
      - "biome.json"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "vite.config.ts"
      - "biome.json"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-rust:
    name: Rust Tests (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            runner: ubuntu-latest
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Create sidecar placeholder
        shell: bash
        run: |
          TARGET=$(rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p src-tauri/binaries
          if [[ "$TARGET" == *"windows"* ]]; then
            touch "src-tauri/binaries/faber-mcp-${TARGET}.exe"
          else
            touch "src-tauri/binaries/faber-mcp-${TARGET}"
          fi

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
